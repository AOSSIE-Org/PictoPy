info:
  name: Get Album
  type: http
  seq: 3
  tags:
    - Albums

http:
  method: GET
  url: "{{baseUrl}}/albums/:album_id"
  params:
    - name: album_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/albums/:album_id"
      method: GET
      params:
        - name: album_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "data": {
              "album_id": "",
              "album_name": "",
              "description": "",
              "is_hidden": false
            }
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/albums/:album_id"
      method: GET
      params:
        - name: album_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
