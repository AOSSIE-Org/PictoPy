info:
  name: Update Album
  type: http
  seq: 4
  tags:
    - Albums

http:
  method: PUT
  url: "{{baseUrl}}/albums/:album_id"
  params:
    - name: album_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "is_hidden": false,
        "current_password": "",
        "password": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/albums/:album_id"
      method: PUT
      params:
        - name: album_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "is_hidden": false,
            "current_password": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "msg": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/albums/:album_id"
      method: PUT
      params:
        - name: album_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "is_hidden": false,
            "current_password": "",
            "password": ""
          }
    response:
      status: 422
