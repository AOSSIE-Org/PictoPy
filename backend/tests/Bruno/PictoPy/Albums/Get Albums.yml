info:
  name: Get Albums
  type: http
  seq: 1
  tags:
    - Albums

http:
  method: GET
  url: "{{baseUrl}}/albums/"
  params:
    - name: show_hidden
      value: "false"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/albums/"
      method: GET
      params:
        - name: show_hidden
          value: "false"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "albums": [
              {
                "album_id": "",
                "album_name": "",
                "description": "",
                "is_hidden": false
              }
            ]
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/albums/"
      method: GET
      params:
        - name: show_hidden
          value: "false"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }
