info:
  name: Setup Models
  type: http
  seq: 4
  tags:
    - Models

http:
  method: POST
  url: "{{baseUrl}}/models/setup"
  body:
    type: json
    data: |-
      {
        "tier": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/models/setup"
      method: POST
      body:
        type: json
        data: |-
          {
            "tier": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/models/setup"
      method: POST
      body:
        type: json
        data: |-
          {
            "tier": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Initializes setup by starting downloads for a specific tier + required models.
  Returns a single task_id to track overall progress.
