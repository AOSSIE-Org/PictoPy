info:
  name: Start Download Model
  type: http
  seq: 5
  tags:
    - Models

http:
  method: POST
  url: "{{baseUrl}}/models/download/:model_key"
  params:
    - name: model_key
      value: facenet
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/models/download/:model_key"
      method: POST
      params:
        - name: model_key
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/models/download/:model_key"
      method: POST
      params:
        - name: model_key
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Starts download for a specific model by key. Returns a task_id.
