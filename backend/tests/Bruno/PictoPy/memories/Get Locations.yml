info:
  name: Get Locations
  type: http
  seq: 4
  tags:
    - memories

http:
  method: GET
  url: "{{baseUrl}}/api/memories/locations"
  params:
    - name: location_radius_km
      value: "5"
      type: query
      description: Location clustering radius in km
    - name: max_sample_images
      value: "5"
      type: query
      description: Max sample images per location
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/memories/locations"
      method: GET
      params:
        - name: location_radius_km
          value: "5"
          type: query
          description: Location clustering radius in km
        - name: max_sample_images
          value: "5"
          type: query
          description: Max sample images per location
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/memories/locations"
      method: GET
      params:
        - name: location_radius_km
          value: "5"
          type: query
          description: Location clustering radius in km
        - name: max_sample_images
          value: "5"
          type: query
          description: Max sample images per location
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Get all unique locations where photos were taken.

  This endpoint:
  1. Fetches all images with GPS coordinates
  2. Clusters them by location
  3. Returns location clusters with photo counts
  4. Includes sample images for each location

  Args:
      location_radius_km: Location clustering radius (default: 5km)
      max_sample_images: Maximum sample images per location (default: 5)

  Returns:
      LocationsResponse with list of location clusters

  Raises:
      HTTPException: If database query fails
