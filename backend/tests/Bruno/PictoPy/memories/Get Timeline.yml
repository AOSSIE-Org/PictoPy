info:
  name: Get Timeline
  type: http
  seq: 2
  tags:
    - memories

http:
  method: GET
  url: "{{baseUrl}}/api/memories/timeline"
  params:
    - name: days
      value: "365"
      type: query
      description: Number of days to look back
    - name: location_radius_km
      value: "5"
      type: query
      description: Location clustering radius in km
    - name: date_tolerance_days
      value: "3"
      type: query
      description: Date tolerance in days
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/memories/timeline"
      method: GET
      params:
        - name: days
          value: "365"
          type: query
          description: Number of days to look back
        - name: location_radius_km
          value: "5"
          type: query
          description: Location clustering radius in km
        - name: date_tolerance_days
          value: "3"
          type: query
          description: Date tolerance in days
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/memories/timeline"
      method: GET
      params:
        - name: days
          value: "365"
          type: query
          description: Number of days to look back
        - name: location_radius_km
          value: "5"
          type: query
          description: Location clustering radius in km
        - name: date_tolerance_days
          value: "3"
          type: query
          description: Date tolerance in days
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: |-
  Get memories from the past N days as a timeline.

  This endpoint:
  1. Calculates date range (today - N days to today)
  2. Fetches images within that date range
  3. Clusters them into memories
  4. Returns timeline of memories

  Args:
      days: Number of days to look back (default: 365 = 1 year)
      location_radius_km: Location clustering radius (default: 5km)
      date_tolerance_days: Date tolerance for temporal clustering (default: 3)

  Returns:
      TimelineResponse with memories ordered by date

  Raises:
      HTTPException: If database query fails
