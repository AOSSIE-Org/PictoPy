info:
  name: Update User Preferences
  type: http
  seq: 2
  tags:
    - User_Preferences

http:
  method: PUT
  url: "{{baseUrl}}/user-preferences/"
  body:
    type: json
    data: |-
      {
        "YOLO_model_size": "",
        "GPU_Acceleration": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

