info:
  name: Toggle Favourite
  type: http
  seq: 2
  tags:
    - Images

http:
  method: POST
  url: "{{baseUrl}}/images/toggle-favourite"
  body:
    type: json
    data: |-
      {
        "image_id": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/images/toggle-favourite"
      method: POST
      body:
        type: json
        data: |-
          {
            "image_id": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/images/toggle-favourite"
      method: POST
      body:
        type: json
        data: |-
          {
            "image_id": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": ""
              }
            ]
          }

docs: Toggle the favorite status of an image.
