info:
  name: Enable Ai Tagging
  type: http
  seq: 2
  tags:
    - Folders

http:
  method: POST
  url: "{{baseUrl}}/folders/enable-ai-tagging"
  body:
    type: json
    data: |-
      {
        "folder_ids": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/folders/enable-ai-tagging"
      method: POST
      body:
        type: json
        data: |-
          {
            "folder_ids": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "error": "",
            "data": ""
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/folders/enable-ai-tagging"
      method: POST
      body:
        type: json
        data: |-
