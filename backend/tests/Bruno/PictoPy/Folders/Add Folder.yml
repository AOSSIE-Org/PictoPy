info:
  name: Add Folder
  type: http
  seq: 1
  tags:
    - Folders

http:
  method: POST
  url: "{{baseUrl}}/folders/add-folder"
  body:
    type: json
    data: |-
      {
        "folder_path": "",
        "parent_folder_id": "",
        "taggingCompleted": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

