info:
  name: Get All Clusters
  type: http
  seq: 2
  tags:
    - Face_Clusters

http:
  method: GET
  url: "{{baseUrl}}/face-clusters/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/face-clusters/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "error": "",
            "data": ""
          }
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/face-clusters/"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "error": ""
          }

docs: Get metadata for all face clusters including face counts.
