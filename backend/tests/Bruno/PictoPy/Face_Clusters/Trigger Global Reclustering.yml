info:
  name: Trigger Global Reclustering
  type: http
  seq: 5
  tags:
    - Face_Clusters

http:
  method: POST
  url: "{{baseUrl}}/face-clusters/global-recluster"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/face-clusters/global-recluster"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "error": "",
            "data": ""
          }
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/face-clusters/global-recluster"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "",
            "error": ""
          }

docs: |-
  Manually trigger global face reclustering.
  This forces full reclustering regardless of the 24-hour rule.
